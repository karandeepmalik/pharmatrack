# ── Server ────────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/

# ── DataSource ────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/pharma_inventory}
spring.datasource.username=${DB_USERNAME:pharma}
spring.datasource.password=${DB_PASSWORD:pharma}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ───────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Jackson ───────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ── Multipart (screenshot uploads) ───────────────────────────────────
spring.servlet.multipart.max-file-size=6MB
spring.servlet.multipart.max-request-size=10MB

# ── JWT ───────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:change-me-in-production-must-be-at-least-256-bits-long}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── CORS ─────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:80}

# ── Actuator ─────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=Pharma Inventory
info.app.version=@project.version@
spring.application.name=pharmatrack

# ── Cloud Monitoring (Stackdriver Micrometer) ────────────────────────
# Enabled in Cloud Run by setting ENABLE_STACKDRIVER=true + GCP_PROJECT_ID
management.stackdriver.metrics.export.enabled=${ENABLE_STACKDRIVER:false}
management.stackdriver.metrics.export.project-id=${GCP_PROJECT_ID:}
management.stackdriver.metrics.export.step=60s

# ── Logging ──────────────────────────────────────────────────────────
logging.level.com.pharma=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:WARN}

app.cookie.secure=${COOKIE_SECURE:false}
