name: CI / CD — PharmaTrack

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: project-35eb97fa-dede-4ae8-ba6
  REGION: asia-south1
  REGISTRY: asia-south1-docker.pkg.dev
  IMAGE_PREFIX: project-35eb97fa-dede-4ae8-ba6/pharmatrack-repo/pharmatrack
  WIF_PROVIDER: projects/558147403401/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  WIF_SA: github-actions-sa@project-35eb97fa-dede-4ae8-ba6.iam.gserviceaccount.com

jobs:
  # ════════════════════════════════════════════════════════════════════
  # JOB 1 — Backend tests & build
  # ════════════════════════════════════════════════════════════════════
  backend-test:
    name: Backend — Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Run unit & integration tests
        run: mvn verify -P test -q
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/target/surefire-reports/
          retention-days: 7

      - name: Build JAR (skip tests — already ran)
        run: mvn package -DskipTests -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 1

  # ════════════════════════════════════════════════════════════════════
  # JOB 2 — Frontend tests & build
  # ════════════════════════════════════════════════════════════════════
  frontend-test:
    name: Frontend — Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run Jest unit tests
        run: npm run test:unit -- --coverage --coverageReporters=text-summary

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

      - name: Build React production bundle
        run: npm run build
        env:
          CI: true
          REACT_APP_API_URL: https://pharmatrack-backend-558147403401.asia-south1.run.app/api

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 1

  # ════════════════════════════════════════════════════════════════════
  # JOB 3 — Build & push Docker images to Artifact Registry (main only)
  # ════════════════════════════════════════════════════════════════════
  docker-build-push:
    name: Docker — Build & Push to Artifact Registry
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SA }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
          build-args: |
            REACT_APP_API_URL=https://pharmatrack-backend-558147403401.asia-south1.run.app/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ════════════════════════════════════════════════════════════════════
  # JOB 4 — Deploy to Cloud Run (main only)
  # ════════════════════════════════════════════════════════════════════
  deploy-cloud-run:
    name: Deploy → Cloud Run
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    environment:
      name: production
      url: https://pharmatrack-frontend-558147403401.asia-south1.run.app

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SA }}

      - name: Deploy backend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: pharmatrack-backend
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}

      - name: Deploy frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: pharmatrack-frontend
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}

      - name: Print deployed URLs
        run: |
          echo "Backend: https://pharmatrack-backend-558147403401.asia-south1.run.app"
          echo "Frontend: https://pharmatrack-frontend-558147403401.asia-south1.run.app"
