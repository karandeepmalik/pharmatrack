# ── Backend Deployment ─────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: pharmatrack
type: Opaque
stringData:
  JWT_SECRET: CHANGE_ME_generate_with_openssl_rand_base64_64
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: pharmatrack
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/YOUR_ORG/pharmatrack-backend:latest   # update this
          ports:
            - containerPort: 8080
          env:
            - name: DB_URL
              value: jdbc:postgresql://postgres:5432/pharma_inventory
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_SECRET
            - name: JWT_EXPIRATION_MS
              value: "86400000"
            - name: CORS_ORIGINS
              value: "https://yourdomain.com"
            - name: DDL_AUTO
              value: validate
            - name: LOG_LEVEL
              value: WARN
          resources:
            requests: { memory: 384Mi, cpu: 250m }
            limits:   { memory: 768Mi, cpu: 1000m }
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: pharmatrack
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
