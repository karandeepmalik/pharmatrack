steps:
  # ── 1. Backend unit + integration tests (H2 in-memory, no DB needed) ──
  - name: 'maven:3.9.5-eclipse-temurin-17-alpine'
    id: backend-test
    dir: backend
    args:
      - mvn
      - test
      - -Dspring.profiles.active=test
      - -q

  # ── 2. Build backend Docker image ─────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: backend-build
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/pharmatrack-repo/pharmatrack-backend:$SHORT_SHA
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/pharmatrack-repo/pharmatrack-backend:latest
      - backend
    waitFor: [backend-test]

  # ── 3. Push backend image ─────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: backend-push
    args:
      - push
      - --all-tags
      - asia-south1-docker.pkg.dev/$PROJECT_ID/pharmatrack-repo/pharmatrack-backend
    waitFor: [backend-build]

  # ── 4. Deploy backend to Cloud Run ────────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: backend-deploy
    args:
      - run
      - deploy
      - pharmatrack-backend
      - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/pharmatrack-repo/pharmatrack-backend:$SHORT_SHA
      - --region=asia-south1
      - --platform=managed
    waitFor: [backend-push]

  # ── 5. Build frontend Docker image ────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: frontend-build
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/pharmatrack-repo/pharmatrack-frontend:$SHORT_SHA
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/pharmatrack-repo/pharmatrack-frontend:latest
      - --build-arg
      - REACT_APP_API_URL=https://pharmatrack-backend-558147403401.asia-south1.run.app/api
      - frontend
    waitFor: [backend-test]

  # ── 6. Push frontend image ────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: frontend-push
    args:
      - push
      - --all-tags
      - asia-south1-docker.pkg.dev/$PROJECT_ID/pharmatrack-repo/pharmatrack-frontend
    waitFor: [frontend-build]

  # ── 7. Deploy frontend to Cloud Run ──────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: frontend-deploy
    args:
      - run
      - deploy
      - pharmatrack-frontend
      - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/pharmatrack-repo/pharmatrack-frontend:$SHORT_SHA
      - --region=asia-south1
      - --platform=managed
    waitFor: [frontend-push]

  # ── 8. E2E tests against production Cloud Run services ───────────────
  - name: 'node:20-alpine'
    id: e2e-test
    dir: e2e
    entrypoint: node
    args: ['auth.test.js']
    waitFor: [backend-deploy, frontend-deploy]

options:
  logging: LEGACY
  machineType: E2_HIGHCPU_8

timeout: 1200s
